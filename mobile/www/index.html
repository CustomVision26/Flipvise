<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no"
    />
    <meta name="theme-color" content="#0a0a0b" />
    <title>Flipvise</title>
    <script>
      (function () {
        try {
          var cap = window.Capacitor;
          var ua = navigator.userAgent;
          if (
            /FlipviseNative\//.test(ua) ||
            (cap && cap.isNativePlatform && cap.isNativePlatform())
          ) {
            var root = document.documentElement;
            root.dataset.nativeShell = "1";
            root.dataset.flipviseNativeShell = "1";
            var platform = cap && cap.getPlatform ? cap.getPlatform() : "";
            if (platform) root.dataset.platform = platform;
            else if (/Android/i.test(ua)) root.dataset.platform = "android";
            else if (/iPhone|iPad|iPod/i.test(ua)) root.dataset.platform = "ios";
          }
        } catch (e) {}
      })();
    </script>
    <style>
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #09090b;
        color: #fafafa;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        padding: 24px;
        padding-top: calc(24px + max(env(safe-area-inset-top, 0px), 28px));
        padding-bottom: calc(24px + max(env(safe-area-inset-bottom, 0px), 16px));
        transition: opacity 0.35s ease, visibility 0.35s ease;
      }
      #boot-splash.boot-splash--out {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .boot-splash__content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }
      .boot-splash__logo {
        width: 88px;
        height: 88px;
        object-fit: contain;
        border-radius: 20px;
        box-shadow: 0 12px 40px rgba(99, 102, 241, 0.22);
        animation: boot-logo-in 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      .boot-splash__caption {
        margin: 0;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #a1a1aa;
        animation: boot-caption-in 0.65s ease 0.35s both;
      }
      .boot-splash__loader {
        margin-top: 10px;
        width: 120px;
        height: 3px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        overflow: hidden;
        animation: boot-caption-in 0.5s ease 0.55s both;
      }
      .boot-splash__loader-bar {
        display: block;
        width: 45%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #6366f1, #7c3aed);
        animation: boot-loader-slide 1.1s ease-in-out infinite;
      }
      @keyframes boot-logo-in {
        from {
          opacity: 0;
          transform: scale(0.86);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      @keyframes boot-caption-in {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes boot-loader-slide {
        0% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(280%);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .boot-splash__logo,
        .boot-splash__caption,
        .boot-splash__loader,
        .boot-splash__loader-bar {
          animation: none;
        }
      }
      #boot-error {
        display: none;
        margin-top: 20px;
        max-width: 320px;
        text-align: center;
        font-size: 13px;
        line-height: 1.5;
        color: #f87171;
      }
    </style>
    
    <link rel="stylesheet" href="./assets/style-CyMtuD5s.css">
  </head>
  <body>
    <div id="boot-splash" aria-live="polite" aria-label="Starting Flipvise">
      <div class="boot-splash__content">
        <img class="boot-splash__logo" src="./logo.png" alt="Flipvise" />
        <p class="boot-splash__caption">By Flipvise Studio</p>
        <div class="boot-splash__loader" aria-hidden="true">
          <span class="boot-splash__loader-bar"></span>
        </div>
      </div>
      <p id="boot-error"></p>
    </div>
    <div id="root"></div>
    <script>
      (function () {
        var splash = document.getElementById("boot-splash");
        var errEl = document.getElementById("boot-error");
        function showBootError(msg) {
          if (!splash || !errEl) return;
          errEl.textContent = msg;
          errEl.style.display = "block";
        }
        window.addEventListener(
          "error",
          function (e) {
            var src = e.filename || (e.target && e.target.src) || "";
            if (/\.js($|\?)/.test(src)) {
              showBootError(
                "The app could not start (" + (e.message || "script error") + "). Pull to refresh in TestFlight or reinstall.",
              );
            }
          },
          true,
        );
        window.addEventListener("unhandledrejection", function (e) {
          var reason = e.reason && (e.reason.message || String(e.reason));
          if (reason) showBootError("Startup failed: " + reason);
        });
        window.__flipviseDismissBootSplash = function () {
          if (!splash) return;
          splash.classList.add("boot-splash--out");
          window.setTimeout(function () {
            splash && splash.remove();
          }, 360);
        };
        window.setTimeout(function () {
          if (splash && document.body.contains(splash)) {
            showBootError(
              "Still loading… Force-quit and reopen. If this continues, wait for the next TestFlight build.",
            );
          }
        }, 12000);
      })();
    </script>
      <script src="./assets/app.js"></script>
  </body>
</html>
