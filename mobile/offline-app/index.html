<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no"
    />
    <meta name="theme-color" content="#0a0a0b" />
    <title>Flipvise</title>
    <style>
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        background: #09090b;
        color: #fafafa;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        padding: 24px;
        padding-top: calc(24px + env(safe-area-inset-top));
        padding-bottom: calc(24px + env(safe-area-inset-bottom));
      }
      #boot-splash img {
        width: 56px;
        height: 56px;
        border-radius: 14px;
      }
      #boot-splash p {
        margin: 0;
        font-size: 14px;
        color: #a1a1aa;
      }
      #boot-error {
        display: none;
        max-width: 320px;
        text-align: center;
        font-size: 13px;
        line-height: 1.5;
        color: #f87171;
      }
    </style>
  </head>
  <body>
    <div id="boot-splash" aria-live="polite">
      <p style="margin:0;font-size:28px;font-weight:700;letter-spacing:-0.03em;color:#fafafa">
        FLIPVISE
      </p>
      <img src="./logo.png" alt="" />
      <p>Loading Flipvise…</p>
      <p id="boot-error"></p>
    </div>
    <div id="root"></div>
    <script>
      (function () {
        var splash = document.getElementById("boot-splash");
        var errEl = document.getElementById("boot-error");
        function showBootError(msg) {
          if (!splash || !errEl) return;
          errEl.textContent = msg;
          errEl.style.display = "block";
        }
        window.addEventListener(
          "error",
          function (e) {
            var src = e.filename || (e.target && e.target.src) || "";
            if (/\.js($|\?)/.test(src)) {
              showBootError(
                "The app could not start (" + (e.message || "script error") + "). Pull to refresh in TestFlight or reinstall.",
              );
            }
          },
          true,
        );
        window.addEventListener("unhandledrejection", function (e) {
          var reason = e.reason && (e.reason.message || String(e.reason));
          if (reason) showBootError("Startup failed: " + reason);
        });
        window.__flipviseDismissBootSplash = function () {
          splash && splash.remove();
        };
        window.setTimeout(function () {
          if (splash && document.body.contains(splash)) {
            showBootError(
              "Still loading… Force-quit and reopen. If this continues, wait for the next TestFlight build.",
            );
          }
        }, 12000);
      })();
    </script>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
