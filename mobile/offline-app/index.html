<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no"
    />
    <meta name="theme-color" content="#0a0a0b" />
    <title>Flipvise</title>
    <script>
      (function () {
        try {
          var cap = window.Capacitor;
          var ua = navigator.userAgent;
          if (
            /FlipviseNative\//.test(ua) ||
            (cap && cap.isNativePlatform && cap.isNativePlatform())
          ) {
            var root = document.documentElement;
            root.dataset.nativeShell = "1";
            root.dataset.flipviseNativeShell = "1";
            var platform = cap && cap.getPlatform ? cap.getPlatform() : "";
            if (platform) root.dataset.platform = platform;
            else if (/Android/i.test(ua)) root.dataset.platform = "android";
            else if (/iPhone|iPad|iPod/i.test(ua)) root.dataset.platform = "ios";
          }
        } catch (e) {}
      })();
    </script>
    <style>
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #09090b;
        background-image:
          radial-gradient(ellipse 85% 55% at 50% 42%, rgba(99, 102, 241, 0.09), transparent 68%),
          radial-gradient(ellipse 120% 80% at 50% 100%, rgba(24, 24, 27, 0.9), transparent 55%);
        color: #fafafa;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        padding: 32px 28px;
        padding-top: calc(32px + max(env(safe-area-inset-top, 0px), 28px));
        padding-bottom: calc(32px + max(env(safe-area-inset-bottom, 0px), 16px));
        transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1),
          visibility 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }
      #boot-splash.boot-splash--out {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .boot-splash__content {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: min(100%, 280px);
        animation: boot-content-in 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      .boot-splash__logo-frame {
        display: grid;
        place-items: center;
        width: 104px;
        height: 104px;
        margin-bottom: 22px;
        border-radius: 24px;
        background: linear-gradient(145deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02));
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow:
          0 0 0 1px rgba(0, 0, 0, 0.35) inset,
          0 20px 48px rgba(0, 0, 0, 0.45),
          0 8px 24px rgba(99, 102, 241, 0.12);
      }
      .boot-splash__logo {
        width: 72px;
        height: 72px;
        object-fit: contain;
        border-radius: 16px;
      }
      .boot-splash__wordmark {
        margin: 0 0 10px;
        font-size: 1.375rem;
        font-weight: 600;
        letter-spacing: -0.03em;
        line-height: 1.2;
        color: #fafafa;
      }
      .boot-splash__caption {
        margin: 0;
        font-size: 0.6875rem;
        font-weight: 500;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #71717a;
      }
      .boot-splash__rule {
        width: 48px;
        height: 1px;
        margin: 22px 0 20px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.22) 50%,
          transparent
        );
      }
      .boot-splash__loader {
        width: 100%;
        max-width: 160px;
        height: 2px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.07);
        overflow: hidden;
      }
      .boot-splash__loader-bar {
        display: block;
        width: 0;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #6366f1, #818cf8 55%, #a78bfa);
        animation: boot-progress-fill 5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }
      @keyframes boot-content-in {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes boot-progress-fill {
        from {
          width: 0;
        }
        to {
          width: 100%;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .boot-splash__content {
          animation: none;
        }
        .boot-splash__loader-bar {
          width: 100%;
          animation: none;
        }
      }
      #boot-error {
        display: none;
        margin-top: 24px;
        max-width: 300px;
        text-align: center;
        font-size: 13px;
        line-height: 1.55;
        color: #f87171;
      }
    </style>
  </head>
  <body>
    <div id="boot-splash" aria-live="polite" aria-label="Starting Flipvise">
      <div class="boot-splash__content">
        <div class="boot-splash__logo-frame">
          <img class="boot-splash__logo" src="./logo.png" alt="" />
        </div>
        <h1 class="boot-splash__wordmark">Flipvise</h1>
        <p class="boot-splash__caption">By Flipvise Studio</p>
        <div class="boot-splash__rule" aria-hidden="true"></div>
        <div class="boot-splash__loader" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-label="Loading">
          <span class="boot-splash__loader-bar"></span>
        </div>
      </div>
      <p id="boot-error"></p>
    </div>
    <div id="root"></div>
    <script>
      (function () {
        var splash = document.getElementById("boot-splash");
        var errEl = document.getElementById("boot-error");
        function showBootError(msg) {
          if (!splash || !errEl) return;
          errEl.textContent = msg;
          errEl.style.display = "block";
        }
        window.addEventListener(
          "error",
          function (e) {
            var src = e.filename || (e.target && e.target.src) || "";
            if (/\.js($|\?)/.test(src)) {
              showBootError(
                "The app could not start (" + (e.message || "script error") + "). Pull to refresh in TestFlight or reinstall.",
              );
            }
          },
          true,
        );
        window.addEventListener("unhandledrejection", function (e) {
          var reason = e.reason && (e.reason.message || String(e.reason));
          if (reason) showBootError("Startup failed: " + reason);
        });
        window.__flipviseDismissBootSplash = function () {
          if (!splash) return;
          splash.classList.add("boot-splash--out");
          window.setTimeout(function () {
            splash && splash.remove();
          }, 520);
        };
        window.setTimeout(function () {
          if (splash && document.body.contains(splash)) {
            showBootError(
              "Still loading… Force-quit and reopen. If this continues, wait for the next TestFlight build.",
            );
          }
        }, 12000);
      })();
    </script>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
