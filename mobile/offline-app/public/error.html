<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no"
    />
    <meta name="theme-color" content="#09090b" />
    <title>Flipvise — Connection problem</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #09090b;
        --panel: #121216;
        --border: #2a2a32;
        --fg: #fafafa;
        --muted: #a1a1aa;
        --accent: #6366f1;
        --accent-2: #7c3aed;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--fg);
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .wrap {
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        padding-top: calc(24px + env(safe-area-inset-top));
        padding-bottom: calc(24px + env(safe-area-inset-bottom));
        text-align: center;
      }
      .mark {
        width: 48px;
        height: 48px;
        border-radius: 14px;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        display: grid;
        place-items: center;
        font-size: 22px;
        font-weight: 700;
        margin-bottom: 20px;
        box-shadow: 0 8px 24px rgba(99, 102, 241, 0.25);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      p {
        margin: 0 0 8px;
        max-width: 320px;
        font-size: 14px;
        line-height: 1.55;
        color: var(--muted);
      }
      .url {
        margin: 12px 0 24px;
        padding: 10px 12px;
        max-width: 100%;
        width: min(100%, 360px);
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--panel);
        font-size: 11px;
        line-height: 1.4;
        color: var(--muted);
        word-break: break-all;
      }
      .actions {
        display: flex;
        flex-direction: column;
        gap: 10px;
        width: min(100%, 280px);
      }
      button {
        appearance: none;
        border: 0;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        padding: 14px 18px;
        border-radius: 12px;
        width: 100%;
      }
      .primary {
        background: var(--accent);
        color: #fff;
      }
      .primary:disabled {
        opacity: 0.65;
        cursor: default;
      }
      .secondary {
        background: var(--panel);
        color: var(--fg);
        border: 1px solid var(--border);
      }
      .hint {
        margin-top: 20px;
        font-size: 12px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="mark" aria-hidden="true">F</div>
      <h1>Page couldn’t load</h1>
      <p id="message">
        Check your connection and try again, or return to offline study on this device.
      </p>
      <div class="url" id="failed-url" hidden></div>
      <div class="actions">
        <button type="button" class="primary" id="refresh-btn">Try again</button>
        <button type="button" class="secondary" id="offline-btn">Back to offline study</button>
      </div>
      <p class="hint" id="status-hint"></p>
    </div>
    <script>
      (function () {
        var PROD_HOST = "https://flipvise-sjgw.onrender.com";
        var PREF_LAST_URL = "flipvise.offline.lastNavigationUrl";
        var PREF_API_BASE = "flipvise.offline.apiBaseUrl";
        var recoverAttempted = false;
        var retryUrl = "";

        function offlineHomeUrl() {
          try {
            if (
              window.Capacitor &&
              window.Capacitor.getPlatform &&
              window.Capacitor.getPlatform() === "ios"
            ) {
              return "capacitor://localhost/index.html";
            }
          } catch (e) {}
          var ua = navigator.userAgent || "";
          if (
            ua.indexOf("FlipviseNative") !== -1 &&
            (/iPhone|iPad|iPod/.test(ua) ||
              (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1))
          ) {
            return "capacitor://localhost/";
          }
          return "https://localhost/";
        }

        function preferencesPlugin() {
          try {
            if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.Preferences) {
              return window.Capacitor.Plugins.Preferences;
            }
          } catch (e) {}
          return null;
        }

        function prefGet(key) {
          var P = preferencesPlugin();
          if (!P) return Promise.resolve(null);
          return P.get({ key: key })
            .then(function (r) {
              return r && r.value ? r.value : null;
            })
            .catch(function () {
              return null;
            });
        }

        function unwrapNativeSignInUrl(url) {
          try {
            var u = new URL(url);
            if (u.pathname.indexOf("/native-signin") === -1) return url;
            var redirect = u.searchParams.get("redirect");
            if (
              redirect &&
              redirect.charAt(0) === "/" &&
              redirect.indexOf("//") !== 0
            ) {
              return u.origin + redirect;
            }
          } catch (e) {}
          return url;
        }

        function buildDefaultRetryUrl(base) {
          var origin = (base || PROD_HOST).replace(/\/$/, "");
          return origin + "/dashboard";
        }

        function resolveRetryUrl() {
          var params = new URLSearchParams(location.search);
          var fromQuery = params.get("url");
          if (fromQuery) return Promise.resolve(unwrapNativeSignInUrl(fromQuery));

          return prefGet(PREF_LAST_URL).then(function (fromPrefs) {
            if (fromPrefs) return unwrapNativeSignInUrl(fromPrefs);
            try {
              var fromSession = sessionStorage.getItem("flipvise.lastNavigationUrl");
              if (fromSession) return unwrapNativeSignInUrl(fromSession);
            } catch (e) {}
            return prefGet(PREF_API_BASE).then(function (base) {
              return buildDefaultRetryUrl(base);
            });
          });
        }

        function probeLiveHost(url) {
          var origin;
          try {
            origin = new URL(url).origin;
          } catch (e) {
            return Promise.resolve(false);
          }
          var controller = typeof AbortController !== "undefined" ? new AbortController() : null;
          var timer = controller
            ? setTimeout(function () {
                controller.abort();
              }, 20000)
            : null;
          return fetch(origin + "/", {
            method: "GET",
            cache: "no-store",
            credentials: "omit",
            signal: controller ? controller.signal : undefined,
          })
            .then(function (res) {
              if (timer) clearTimeout(timer);
              return res.ok || res.status === 401 || res.status === 403 || res.status === 404;
            })
            .catch(function () {
              if (timer) clearTimeout(timer);
              return false;
            });
        }

        function setOnlineHint(recovering) {
          var hint = document.getElementById("status-hint");
          if (!hint) return;
          if (recovering) {
            hint.textContent = "Reconnecting…";
            return;
          }
          if (navigator.onLine) {
            hint.textContent = "You appear to be online — tap Try again to retry.";
          } else {
            hint.textContent = "You appear to be offline.";
          }
        }

        function goRetry(url) {
          if (!url) return;
          var btn = document.getElementById("refresh-btn");
          if (btn) btn.disabled = true;
          setOnlineHint(true);
          window.location.replace(url);
        }

        function tryAutoRecover() {
          if (recoverAttempted || !navigator.onLine) return;
          recoverAttempted = true;
          resolveRetryUrl().then(function (url) {
            if (!url) {
              recoverAttempted = false;
              return;
            }
            probeLiveHost(url).then(function (reachable) {
              if (reachable) {
                goRetry(url);
              } else {
                recoverAttempted = false;
                setOnlineHint(false);
              }
            });
          });
        }

        resolveRetryUrl().then(function (url) {
          retryUrl = url;
          var urlEl = document.getElementById("failed-url");
          if (urlEl) {
            urlEl.textContent = url;
            urlEl.hidden = false;
          }
        });

        var params = new URLSearchParams(location.search);
        if (params.get("offline") === "1") {
          var msg = document.getElementById("message");
          if (msg) {
            msg.textContent =
              "The dashboard needs an internet connection. Study your downloaded decks offline, or connect and tap Try again.";
          }
        } else if (params.get("reason") === "cleartext") {
          var cleartextMsg = document.getElementById("message");
          if (cleartextMsg) {
            cleartextMsg.textContent =
              "Could not reach the dev server. Make sure npm run dev is running on your PC, then tap Try again — or go back to offline study.";
          }
        }

        document.getElementById("refresh-btn").addEventListener("click", function () {
          resolveRetryUrl().then(function (url) {
            goRetry(url);
          });
        });

        document.getElementById("offline-btn").addEventListener("click", function () {
          window.location.replace(offlineHomeUrl());
        });

        window.addEventListener("online", function () {
          setOnlineHint(false);
        });
        window.addEventListener("offline", function () {
          setOnlineHint(false);
        });
        setOnlineHint(false);
      })();
    </script>
  </body>
</html>
