<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Offline — Flipvise</title>
    <style>
      :root { color-scheme: dark; }
      html, body {
        margin: 0; height: 100%;
        background: #0a0a0b; color: #f4f4f5;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        display: flex; align-items: center; justify-content: center; text-align: center;
      }
      .wrap { padding: 24px; max-width: 420px; }
      .logo {
        width: 72px; height: 72px; margin: 0 auto 20px;
        border-radius: 18px; background: linear-gradient(135deg, #6366f1, #8b5cf6);
        display: grid; place-items: center; font-size: 34px; font-weight: 700;
      }
      h1 { font-size: 20px; margin: 0 0 10px; }
      p { color: #a1a1aa; line-height: 1.5; margin: 0 0 20px; }
      button {
        appearance: none; border: 0; cursor: pointer;
        background: #6366f1; color: white; font-size: 15px; font-weight: 600;
        padding: 11px 20px; border-radius: 12px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="logo">F</div>
      <h1>You're offline</h1>
      <p>This page needs a connection. Decks you've already opened are still available to study in the app.</p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
