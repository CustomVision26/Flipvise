name: iOS TestFlight

# Builds the Capacitor iOS app on a macOS runner and uploads it to TestFlight.
# Trigger manually from the Actions tab, by pushing a tag like `ios-v1.0.0`,
# or automatically on pushes to `main` that touch mobile/iOS-related files.
on:
  workflow_dispatch:
  push:
    tags:
      - "ios-v*"
    branches:
      - main
    paths:
      - ".github/workflows/ios.yml"
      - "package.json"
      - "package-lock.json"
      - "capacitor.config.ts"
      - "mobile/**"
      - "ios/**"
      - "fastlane/**"

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & upload to TestFlight
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # Node 24 matches the version the lockfile was generated with (npm 11)
          # and satisfies Capacitor 8's CLI requirement of Node >= 22.
          node-version: "24"
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Build mobile web assets
        run: npm run mobile:build:prod

      - name: Sync Capacitor iOS project
        run: npx cap sync ios

      - name: Set up Ruby (fastlane)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build and upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bundle exec fastlane ios beta

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-output
          path: |
            build/*.ipa
            build/*.app.dSYM.zip
          if-no-files-found: ignore
          retention-days: 14
